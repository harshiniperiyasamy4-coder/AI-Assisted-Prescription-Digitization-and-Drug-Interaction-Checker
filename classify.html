<!DOCTYPE html>
<html>
<head>
    <title>Classification Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Training Results</h2>

    <!-- Graphs -->
    <div class="row">
        <div class="col-md-6">
            <h5>Loss Graph</h5>
            <img src="data:image/png;base64,{{ loss_graph }}" class="img-fluid border">
        </div>

        <div class="col-md-6">
            <h5>Accuracy Graph</h5>
            <img src="data:image/png;base64,{{ acc_graph }}" class="img-fluid border">
        </div>
    </div>

    <!-- Images -->
    <div class="mt-5">
        <h4>📸 Processed Images</h4>
        <div class="row">
            {% for img in images %}
            <div class="col-md-3 mb-3">
                <img src="{{ url_for('static', filename='../' + img) }}" class="img-fluid border">
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-success">🏠 Go Home</a>
    </div>

</div>

</body>
</html>
